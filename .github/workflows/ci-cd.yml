name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:

  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        working-directory: api
        run: npm ci

      - name: Run tests
        working-directory: api
        run: npm test

  build:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Build API Docker image
        run: docker build -t kitchen-api:local ./api

  k8s-smoke:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v4

      - uses: azure/setup-kubectl@v4

      - name: Create kind cluster
        uses: helm/kind-action@v1
        with:
         cluster_name: kind

      - name: Build image
        run: docker build -t kitchen-api:local ./api

      - name: Load image into kind
        run: kind load docker-image kitchen-api:local

      # ✅ STEP 1: Namespace
      - name: Apply namespace
        run: kubectl apply -f k8s/namespace.yaml

      # ✅ STEP 2: DB first
      - name: Deploy MongoDB
        run: kubectl apply -f k8s/db/statefulset.yaml

      - name: Wait for MongoDB
        run: kubectl rollout status statefulset/mongo -n kitchen-app --timeout=120s

      # ✅ STEP 3: API
      - name: Deploy API
        run: kubectl apply -f k8s/api/deployment.yaml

      - name: Wait for API
        run: kubectl rollout status deployment/api-deployment -n kitchen-app --timeout=120s

      # ✅ STEP 4: Smoke Test
      - name: Port forward and test
        run: |
          kubectl port-forward svc/api 3000:3000 -n kitchen-app &
          sleep 5
          curl http://localhost:3000/health